<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Obby List — Elite Indonesian Obbyist</title>
  <link rel="icon" type="image/png" href="eio-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #CE1126; --red-dark: #8B0000;
      --white: #FFFFFF;
      --off-white: #F7F7F7;
      --border: #E2E2E2;
      --text: #1a1a1a;
      --text-muted: #777; 
        
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
      border-bottom: 3px solid var(--red);
    }

    .nav-logo { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 3px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--red); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--red); }

    .lang-toggle { display: flex; border: 1.5px solid #E2E2E2; overflow: hidden; border-radius: 4px; }
    .lang-btn { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 0.4rem 0.7rem; background: transparent; border: none; cursor: pointer; color: #777; transition: all 0.2s; }
    .lang-btn.active { background: #CE1126; color: white; }

    .nav-right { display: flex; gap: 1rem; align-items: center; }
    .nav-user { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); }
    .btn-sm { font-family: 'Inter', sans-serif; font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.5rem 1.1rem; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--text); cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .btn-sm:hover { border-color: var(--red); color: var(--red); }

    .page-header {
      padding: 4rem 3rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 100% at 100% 50%, rgba(206,17,38,0.08) 0%, transparent 60%);
    }
    .page-header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 2rem; }
    .eyebrow { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--red); margin-bottom: 0.8rem; }
    .page-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: clamp(3rem, 6vw, 5rem); letter-spacing: 2px; line-height: 1; }

    .header-controls { display: flex; gap: 1rem; flex-wrap: wrap; }
    .search-wrap { position: relative; }
    .search-input { background: var(--dark2); border: 1px solid rgba(255,255,255,0.1); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.8rem; padding: 0.8rem 1rem 0.8rem 2.5rem; outline: none; width: 220px; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--red); }
    .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

    /* FILTER PILLS */
    .filter-wrap { max-width: 1200px; margin: 0 auto; padding: 1.5rem 3rem; display: flex; gap: 0.5rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .filter-pill { font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; padding: 0.4rem 0.9rem; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .filter-pill:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .filter-pill.active { border-color: var(--red); color: var(--red); background: rgba(206,17,38,0.08); }

    /* OBBY GRID */
    .obby-wrap { max-width: 1200px; margin: 0 auto; padding: 3rem; }
    .obby-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .obby-count { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); }

    .obby-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: rgba(255,255,255,0.06); }

    .obby-card {
      background: var(--dark2); padding: 1.8rem;
      position: relative; overflow: hidden; transition: background 0.2s;
    }
    .obby-card:hover { background: var(--dark3); }
    .obby-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: transparent; transition: background 0.2s;
    }
    .obby-card:hover::after { background: var(--red); }

    .obby-num { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 3.5rem; color: rgba(255,255,255,0.05); line-height: 1; position: absolute; top: 0.5rem; right: 1rem; }

    .diff-badge { font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 2px; display: inline-block; margin-bottom: 0.8rem; }
    .diff-unreal { background: rgba(120,0,200,0.15); color: #7800c8; border: 1px solid rgba(120,0,200,0.3); }
    .diff-catastrophic { background: rgba(240,240,240,0.9); color: #1a1a1a; border: 1px solid #ccc; }
    .diff-extreme { background: rgba(30,144,255,0.15); color: #1e90ff; border: 1px solid rgba(30,144,255,0.3); }
    .diff-insane { background: rgba(0,80,220,0.15); color: #0050dc; border: 1px solid rgba(0,80,220,0.3); }
    .diff-remorseless { background: rgba(255,20,147,0.15); color: #ff1493; border: 1px solid rgba(255,20,147,0.3); }
    .diff-intense { background: rgba(30,30,30,0.85); color: #f0f0f0; border: 1px solid #444; }
    .diff-challenging { background: rgba(160,20,20,0.15); color: #a01414; border: 1px solid rgba(160,20,20,0.3); }
    .diff-difficult { background: rgba(255,120,0,0.15); color: #e06000; border: 1px solid rgba(255,120,0,0.3); }
    .diff-hard { background: rgba(255,120,0,0.15); color: #e06000; border: 1px solid rgba(255,120,0,0.3); }
    .diff-medium { background: rgba(220,180,0,0.15); color: #a07800; border: 1px solid rgba(220,180,0,0.3); }
    .diff-easy { background: rgba(30,160,60,0.15); color: #1a9030; border: 1px solid rgba(30,160,60,0.3); }
    .diff-default { background: var(--off-white, #f7f7f7); color: #777; border: 1px solid #ddd; }


    .obby-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.8rem; line-height: 1.3; }

    .obby-completions { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .completion-tag { font-family: 'Inter', sans-serif; font-size: 0.65rem; padding: 0.2rem 0.5rem; background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.08); }
    .more-tag { color: var(--red); border-color: rgba(206,17,38,0.2); background: rgba(206,17,38,0.05); }

    .loading-state, .empty-state { text-align: center; padding: 5rem 2rem; }
    .loading-state p, .empty-state p { font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 2px; color: var(--text-muted); }
    .empty-state h3 { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 2rem; color: rgba(255,255,255,0.15); margin-bottom: 0.5rem; }

    /* ADD COMPLETION (for logged in users) */
    .add-btn-wrap { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; }
    .add-btn {
      font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 2px;
      text-transform: uppercase; padding: 1rem 1.8rem;
      background: var(--red); border: none; color: var(--text); cursor: pointer;
      box-shadow: 0 4px 20px rgba(206,17,38,0.4); transition: all 0.2s; display: none;
    }
    .add-btn:hover { background: var(--red-dark); transform: translateY(-2px); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 200; display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--dark2); border: 1px solid rgba(255,255,255,0.08);
      padding: 2.5rem; width: 90%; max-width: 480px;
      animation: fadeUp 0.3s ease;
    }
    .modal-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 0.4rem; }
    .modal-sub { font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-label { display: block; font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
    .form-input, .form-select { width: 100%; background: var(--white); border: 1px solid rgba(255,255,255,0.1); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 0.8rem 1rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus { border-color: var(--red); }
    .form-select option { background: var(--dark2); }
    .modal-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .btn-cancel { flex: 1; font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.9rem; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .btn-cancel:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .btn-save { flex: 2; font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.9rem; border: 1px solid var(--red); background: var(--red); color: var(--text); cursor: pointer; transition: all 0.2s; }
    .btn-save:hover { background: transparent; color: var(--red); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-msg { font-family: 'Inter', sans-serif; font-size: 0.7rem; padding: 0.7rem 1rem; margin-bottom: 1rem; display: none; }
    .modal-msg.error { background: rgba(206,17,38,0.1); border: 1px solid rgba(206,17,38,0.3); color: #ff6677; }
    .modal-msg.success { background: rgba(0,200,100,0.1); border: 1px solid rgba(0,200,100,0.3); color: #44ff88; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .page-header, .obby-wrap, .filter-wrap { padding-left: 1.5rem; padding-right: 1.5rem; }
      .obby-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">EI<span>O</span></a>
    <ul class="nav-links">
      <li><a href="index.html" data-id="nav-home">Home</a></li>
      <li><a href="players.html">Players</a></li>
      <li><a href="obbys.html" class="active">Obby List</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
    <div class="nav-right"><div class="lang-toggle" style="margin-right:0.5rem">
        <button class="lang-btn" data-lang="id" onclick="setLang('id')">IDN</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">ENG</button>
      </div>
      <span class="nav-user" id="nav-user">—</span>
      <a href="login.html" class="btn-sm" id="nav-login">Login</a>
      <button class="btn-sm" id="nav-logout" style="display:none" onclick="doLogout()" data-id="nav-logout">Logout</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <p class="eyebrow"></p>
        <h1 class="page-title" data-id="page-title">OBBY LIST</h1>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Cari tower..." data-id="search-ph" data-id="search-placeholder" oninput="renderObbys()">
      </div>
    </div>
  </div>

  <div class="filter-wrap">
    <button class="filter-pill active" onclick="setFilter('all', this)" data-id="filter-all" data-id="filter-all">Semua</button>
    <button class="filter-pill" onclick="setFilter('Catastrophic', this)">Catastrophic</button>
    <button class="filter-pill" onclick="setFilter('Extreme', this)">Extreme</button>
    <button class="filter-pill" onclick="setFilter('Insane', this)">Insane</button>
    <button class="filter-pill" onclick="setFilter('Remorseless', this)">Remorseless</button>
    <button class="filter-pill" onclick="setFilter('Intense', this)">Intense</button>
    <button class="filter-pill" onclick="setFilter('Challenging', this)">Challenging</button>
    <button class="filter-pill" onclick="setFilter('Difficult', this)">Difficult</button>
  </div>

  <div class="obby-wrap">
    <div class="obby-meta">
      <span class="obby-count" id="obby-count">Memuat...</span>
    </div>
    <div class="obby-grid" id="obby-grid">
      <div class="loading-state" style="grid-column:1/-1"><p>MEMUAT DATA OBBY...</p></div>
    </div>
  </div>

  <!-- FAB -->
  <div class="add-btn-wrap">
    <button class="add-btn" data-id="add-btn" data-id="add-completion-btn" id="add-btn" onclick="openModal()">+ Tambah Completion</button>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <h2 class="modal-title" data-id="modal-title">TAMBAH COMPLETION</h2>
      <p class="modal-sub" data-id="modal-sub">Catat tower yang berhasil kamu selesaikan</p>
      <div class="modal-msg" id="modal-msg"></div>
      <div class="form-group">
        <label class="form-label">Nama Tower</label>
        <input type="text" class="form-input" id="tower-name" placeholder="contoh: Tower of Pain">
      </div>
      <div class="form-group">
        <label class="form-label">Difficulty</label>
        <select class="form-select" id="tower-diff">
          <option value="">Pilih difficulty...</option>
          <option value="Catastrophic">Catastrophic</option>
          <option value="Extreme">Extreme</option>
          <option value="Insane">Insane</option>
          <option value="Remorseless">Remorseless</option>
          <option value="Intense">Intense</option>
          <option value="Challenging">Challenging</option>
          <option value="Difficult">Difficult</option>
          <option value="Hard">Hard</option>
          <option value="Medium">Medium</option>
          <option value="Easy">Easy</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()" data-id="btn-cancel">Batal</button>
        <button class="btn-save" id="save-btn" onclick="saveCompletion()" data-id="btn-save">Simpan →</button>
      </div>
    </div>
  </div>

  

  

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCL7iA256SiV7VFXUeQ20KAByToy9HQHGQ",
      authDomain: "eio-website.firebaseapp.com",
      projectId: "eio-website",
      storageBucket: "eio-website.firebasestorage.app",
      messagingSenderId: "1030038379623",
      appId: "1:1030038379623:web:54d24cb244d6dc9ade48c2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const diffOrder = {
      'Catastrophic': 10, 'Extreme': 9, 'Insane': 8, 'Remorseless': 7,
      'Intense': 6, 'Challenging': 5, 'Difficult': 4, 'Hard': 3, 'Medium': 2, 'Easy': 1
    };

    const diffClass = {
      'Catastrophic': 'diff-catastrophic', 'Extreme': 'diff-extreme',
      'Insane': 'diff-insane', 'Remorseless': 'diff-remorseless',
      'Intense': 'diff-intense', 'Challenging': 'diff-challenging',
      'Difficult': 'diff-difficult'
    };

    let allObbys = []; // { towerName, difficulty, players: [] }
    let activeFilter = 'all';
    let currentUser = null;
    let currentUserData = null;

    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        const uDoc = await getDoc(doc(db, 'users', user.uid));
        document.getElementById('nav-user').textContent = uDoc.exists() ? (uDoc.data().displayName || uDoc.data().robloxUsername || user.email?.split('@')[0]) : user.email?.split('@')[0];
        document.getElementById('nav-login').style.display = 'none';
        document.getElementById('nav-logout').style.display = 'block';
        document.getElementById('add-btn').style.display = 'block';
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) currentUserData = userDoc.data();
      }
    });

    window.doLogout = async () => { await signOut(auth); window.location.href = 'index.html'; };

    async function loadObbys() {
      const snap = await getDocs(collection(db, 'users'));
      const towerMap = {};

      snap.forEach(docSnap => {
        const data = docSnap.data();
        const completions = data.completions || [];
        completions.forEach(c => {
          const key = c.towerName?.toLowerCase().trim();
          if (!key) return;
          if (!towerMap[key]) {
            towerMap[key] = { towerName: c.towerName, difficulty: c.difficulty, players: [] };
          }
          towerMap[key].players.push(data.robloxUsername || '?');
        });
      });

      allObbys = Object.values(towerMap);
      allObbys.sort((a, b) => (diffOrder[b.difficulty] || 0) - (diffOrder[a.difficulty] || 0));
      renderObbys();
    }

    window.setFilter = (filter, el) => {
      activeFilter = filter;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      renderObbys();
    };

    window.renderObbys = () => {
      const query = document.getElementById('search-input').value.toLowerCase();
      let filtered = allObbys
        .filter(o => {
          const matchFilter = activeFilter === 'all' || o.difficulty === activeFilter;
          const matchSearch = o.towerName.toLowerCase().includes(query);
          return matchFilter && matchSearch;
        })
        .sort((a, b) => (diffOrder[b.difficulty] || 0) - (diffOrder[a.difficulty] || 0));

      document.getElementById('obby-count').textContent = `${filtered.length} tower`;
      const grid = document.getElementById('obby-grid');

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>TIDAK ADA TOWER</h3><p>Belum ada completion yang cocok.</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map((o, i) => {
        const dClass = diffClass[o.difficulty] || 'diff-default';
        const shownPlayers = o.players.slice(0, 4);
        const extra = o.players.length - 4;
        return `
          <div class="obby-card">
            <div class="obby-num">${String(i+1).padStart(2,'0')}</div>
            <span class="diff-badge ${dClass}">${o.difficulty || 'Unknown'}</span>
            <div class="obby-name">${o.towerName}</div>
            <div class="obby-completions">
              ${shownPlayers.map(p => `<span class="completion-tag">${p}</span>`).join('')}
              ${extra > 0 ? `<span class="completion-tag more-tag">+${extra} lagi</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    };

    window.openModal = () => { document.getElementById('modal-overlay').classList.add('open'); };
    window.closeModal = () => {
      document.getElementById('modal-overlay').classList.remove('open');
      document.getElementById('tower-name').value = '';
      document.getElementById('tower-diff').value = '';
      const msg = document.getElementById('modal-msg');
      msg.style.display = 'none';
    };
    window.closeModalOutside = (e) => { if (e.target === document.getElementById('modal-overlay')) closeModal(); };

    window.saveCompletion = async () => {
      if (!currentUser) { window.location.href = 'login.html'; return; }
      const name = document.getElementById('tower-name').value.trim();
      const diff = document.getElementById('tower-diff').value;
      const btn = document.getElementById('save-btn');
      const msg = document.getElementById('modal-msg');
      msg.style.display = 'none';

      if (!name || !diff) {
        msg.textContent = 'Isi semua field dulu!';
        msg.className = 'modal-msg error';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      try {
        const newCompletion = { towerName: name, difficulty: diff, completedAt: new Date().toISOString() };
        await updateDoc(doc(db, 'users', currentUser.uid), { completions: arrayUnion(newCompletion) });
        msg.textContent = 'Completion berhasil ditambahkan!';
        msg.className = 'modal-msg success';
        msg.style.display = 'block';
        btn.textContent = 'Tersimpan ✓';
        await loadObbys();
        setTimeout(() => closeModal(), 1500);
      } catch(e) {
        msg.textContent = 'Gagal menyimpan. Coba lagi.';
        msg.className = 'modal-msg error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Simpan →';
      }
    };

    loadObbys();
  </script>

  

  
  <script>
    (function() {
      var T = {
    "id": {
        "page-title": "OBBY LIST",
        "filter-all": "Semua",
        "search-ph": "Cari tower...",
        "nav-home": "Home",

      window.setLang = function(l) {
        localStorage.setItem('eio-lang', l);
        applyLang(l);
      };
      function applyLang(l) {
        var t = T[l] || T['id'];
        document.querySelectorAll('[data-id]').forEach(function(el) {
          var key = el.getAttribute('data-id');
          if (!t[key]) return;
          if (el.tagName === 'INPUT') { el.placeholder = t[key]; }
          else if (el.tagName === 'A' || el.tagName === 'BUTTON') { el.textContent = t[key]; }
          else { el.innerHTML = t[key]; }
        });
        document.querySelectorAll('.lang-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
        });
      }
      var saved = localStorage.getItem('eio-lang') || 'id';
      applyLang(saved);
    })();
  </script>
