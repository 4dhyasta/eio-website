<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Player List — Elite Indonesian Obbyist</title>
  <link rel="icon" type="image/png" href="eio-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #CE1126;
      --red-dark: #8B0000;
      --white: #FFFFFF;
      --off-white: #F7F7F7;
      --border: #E2E2E2;
      --text: #1a1a1a;
      --text-muted: #777;
      
      
      
      
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 3px solid var(--red);
    }

    .nav-logo { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 3px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--red); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-links a.active { color: var(--red); }


    .lang-toggle { display: flex; border: 1.5px solid #E2E2E2; overflow: hidden; border-radius: 4px; }
    .lang-btn { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 0.4rem 0.7rem; background: transparent; border: none; cursor: pointer; color: #777; transition: all 0.2s; }
    .lang-btn.active { background: #CE1126; color: white; }

    .nav-right { display: flex; gap: 1rem; align-items: center; }
    .nav-user { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); }
    .btn-sm { font-family: 'Inter', sans-serif; font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.5rem 1.1rem; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--text); cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .btn-sm:hover { border-color: var(--red); color: var(--red); }
    .btn-sm-red { border-color: var(--red) !important; background: var(--red) !important; }
    .btn-sm-red:hover { background: transparent !important; color: var(--red) !important; }

    /* PAGE HEADER */
    .page-header {
      padding: 4rem 3rem 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 100% at 0% 50%, rgba(206,17,38,0.08) 0%, transparent 60%);
    }

    .page-header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 2rem; }

    .eyebrow { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--red); margin-bottom: 0.8rem; }
    .page-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: clamp(3rem, 6vw, 5rem); letter-spacing: 2px; line-height: 1; }

    .search-wrap { position: relative; }
    .search-input {
      background: var(--dark2); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.8rem;
      padding: 0.8rem 1rem 0.8rem 2.5rem; outline: none; width: 240px;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--red); }
    .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.8rem; }

    /* TABLE */
    .table-wrap { max-width: 1200px; margin: 0 auto; padding: 3rem; }

    .table-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem;
    }

    .table-count { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); }

    .sort-btns { display: flex; gap: 0.5rem; }
    .sort-btn {
      font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 1px;
      text-transform: uppercase; padding: 0.4rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.1); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    }
    .sort-btn.active { border-color: var(--red); color: var(--red); }

    .player-table { width: 100%; border-collapse: collapse; }

    .player-table thead tr {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .player-table th {
      font-family: 'Inter', sans-serif; font-size: 0.65rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
      text-align: left; padding: 0.8rem 1rem; font-weight: 400;
    }

    .player-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
      cursor: pointer;
    }

    .player-table tbody tr:hover { background: var(--dark2); }

    .player-table td { padding: 1rem; }

    .rank-cell {
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.5rem;
      color: rgba(255,255,255,0.15); width: 60px;
    }

    .rank-1 { color: #FFD700; }
    .rank-2 { color: #C0C0C0; }
    .rank-3 { color: #CD7F32; }

    .player-info { display: flex; align-items: center; gap: 1rem; }

    .player-avatar {
      width: 40px; height: 40px;
      background: var(--dark3);
      border: 1px solid rgba(206,17,38,0.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.1rem; color: var(--red);
      flex-shrink: 0; overflow: hidden;
    }

    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .player-name { font-weight: 700; font-size: 0.95rem; }
    .player-email { font-family: 'Inter', sans-serif; font-size: 0.65rem; color: var(--text-muted); margin-top: 0.2rem; }

    .diff-badge {
      font-family: 'Inter', sans-serif; font-size: 0.65rem;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 0.25rem 0.6rem; border-radius: 2px; display: inline-block;
    }

    .diff-catastrophic { background: rgba(206,17,38,0.2); color: #ff4455; }
    .diff-extreme { background: rgba(255,100,0,0.2); color: #ff6400; }
    .diff-insane { background: rgba(180,0,200,0.2); color: #cc44ff; }
    .diff-remorseless { background: rgba(0,100,255,0.2); color: #4488ff; }
    .diff-intense { background: rgba(0,200,200,0.2); color: #44dddd; }
    .diff-challenging { background: rgba(200,200,0,0.2); color: #dddd44; }
    .diff-default { background: rgba(255,255,255,0.08); color: var(--text-muted); }

    .completion-count {
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; color: var(--text);
    }

    .loading-row td {
      text-align: center; padding: 4rem;
      font-family: 'Inter', sans-serif; font-size: 0.75rem;
      letter-spacing: 2px; color: var(--text-muted);
    }

    .empty-state {
      text-align: center; padding: 5rem 2rem;
    }

    .empty-state h3 {
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 2rem;
      color: rgba(255,255,255,0.2); margin-bottom: 0.5rem;
    }

    .empty-state p { font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--text-muted); }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .page-header { padding: 3rem 1.5rem 2rem; }
      .table-wrap { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">EI<span>O</span></a>
    <ul class="nav-links">
      <li><a href="index.html" data-id="nav-home">Home</a></li>
      <li><a href="players.html" class="active">Players</a></li>
      <li><a href="obbys.html">Obby List</a></li>
    </ul>
    <div class="nav-right"><div class="lang-toggle" style="margin-right:0.5rem">
        <button class="lang-btn" data-lang="id" onclick="setLang('id')">IDN</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">ENG</button>
      </div>
      <span class="nav-user" id="nav-user">—</span>
      <a href="login.html" class="btn-sm" id="nav-login">Login</a>
      <button class="btn-sm" id="nav-logout" style="display:none" onclick="doLogout()" data-id="nav-logout">Logout</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <p class="eyebrow" data-id="page-eyebrow">Leaderboard</p>
        <h1 class="page-title" data-id="page-title">PLAYER LIST</h1>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Cari player..." data-id="search-ph" data-id="search-placeholder" oninput="filterPlayers()">
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-meta">
      <span class="table-count" id="table-count">Memuat...</span>
      <div class="sort-btns">
        <button class="sort-btn active" onclick="sortBy('completions')" data-id="sort-completions">Completions</button>
        <button class="sort-btn" onclick="sortBy('difficulty')" data-id="sort-difficulty">Difficulty</button>
        <button class="sort-btn" onclick="sortBy('name')" data-id="sort-name">Nama</button>
      </div>
    </div>

    <table class="player-table">
      <thead>
        <tr>
          <th data-id="th-rank">#</th>
          <th data-id="th-player">Player</th>
          <th data-id="th-hardest">Hardest Completion</th>
          <th data-id="th-total">Total Completions</th>
          <th data-id="th-joined">Bergabung</th>
        </tr>
      </thead>
      <tbody id="player-tbody">
        <tr class="loading-row"><td colspan="5">MEMUAT DATA PLAYER...</td></tr>
      </tbody>
    </table>
  </div>

  

  

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCL7iA256SiV7VFXUeQ20KAByToy9HQHGQ",
      authDomain: "eio-website.firebaseapp.com",
      projectId: "eio-website",
      storageBucket: "eio-website.firebasestorage.app",
      messagingSenderId: "1030038379623",
      appId: "1:1030038379623:web:54d24cb244d6dc9ade48c2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const diffOrder = {
      'Catastrophic': 10, 'Extreme': 9, 'Insane': 8, 'Remorseless': 7,
      'Intense': 6, 'Challenging': 5, 'Difficult': 4, 'Hard': 3, 'Medium': 2, 'Easy': 1
    };

    const diffClass = {
      'Catastrophic': 'diff-catastrophic', 'Extreme': 'diff-extreme',
      'Insane': 'diff-insane', 'Remorseless': 'diff-remorseless',
      'Intense': 'diff-intense', 'Challenging': 'diff-challenging'
    };

    let allPlayers = [];
    let currentSort = 'completions';

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('nav-user').textContent = user.email?.split('@')[0];
        document.getElementById('nav-login').style.display = 'none';
        document.getElementById('nav-logout').style.display = 'block';
      }
    });

    window.doLogout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    async function loadPlayers() {
      const snap = await getDocs(collection(db, 'users'));
      allPlayers = [];
      snap.forEach(doc => {
        const data = doc.data();
        const completions = data.completions || [];
        let hardest = null;
        let hardestOrder = -1;
        completions.forEach(c => {
          const o = diffOrder[c.difficulty] || 0;
          if (o > hardestOrder) { hardestOrder = o; hardest = c; }
        });
        allPlayers.push({
          uid: doc.id,
          username: data.robloxUsername || '—',
          email: data.email || '',
          completions,
          hardest,
          hardestOrder,
          joinedAt: data.joinedAt || ''
        });
      });
      renderPlayers();
    }

    window.sortBy = (key) => {
      currentSort = key;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderPlayers();
    };

    window.filterPlayers = () => renderPlayers();

    function renderPlayers() {
      const query = document.getElementById('search-input').value.toLowerCase();
      let filtered = allPlayers.filter(p => p.username.toLowerCase().includes(query));

      if (currentSort === 'completions') {
        filtered.sort((a, b) => b.completions.length - a.completions.length);
      } else if (currentSort === 'difficulty') {
        filtered.sort((a, b) => b.hardestOrder - a.hardestOrder);
      } else {
        filtered.sort((a, b) => a.username.localeCompare(b.username));
      }

      const tbody = document.getElementById('player-tbody');
      document.getElementById('table-count').textContent = `${filtered.length} player`;

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><h3>TIDAK ADA PLAYER</h3><p>Belum ada player yang ditemukan.</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map((p, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        const initial = p.username.charAt(0).toUpperCase();
        const joined = p.joinedAt ? new Date(p.joinedAt).toLocaleDateString('id-ID', { year: 'numeric', month: 'short' }) : '—';
        const hardestName = p.hardest ? p.hardest.towerName : '—';
        const hardestDiff = p.hardest ? p.hardest.difficulty : null;
        const dClass = hardestDiff ? (diffClass[hardestDiff] || 'diff-default') : 'diff-default';

        return `
          <tr>
            <td class="rank-cell ${rankClass}">${i + 1}</td>
            <td>
              <div class="player-info">
                <div class="player-avatar">${initial}</div>
                <div>
                  <div class="player-name">${p.username}</div>
                  <div class="player-email">${p.email}</div>
                </div>
              </div>
            </td>
            <td>
              ${hardestDiff ? `<span class="diff-badge ${dClass}">${hardestDiff}</span>` : ''}
              <div style="font-size:0.85rem; margin-top:0.3rem; color:rgba(255,255,255,0.7)">${hardestName}</div>
            </td>
            <td><span class="completion-count">${p.completions.length}</span></td>
            <td style="font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted)">${joined}</td>
          </tr>
        `;
      }).join('');
    }

    loadPlayers();
  </script>

  

  
  <script>
    (function() {
      var T = {
    "id": {
        "page-eyebrow": "Leaderboard",
        "page-title": "PLAYER LIST",
        "search-ph": "Cari player...",
        "sort-completions": "Completions",
        "sort-difficulty": "Difficulty",
        "sort-name": "Nama",
        "th-rank": "#",
        "th-player": "Player",
        "th-hardest": "Hardest Completion",
        "th-total": "Total Completions",
        "th-joined": "Bergabung",
        "nav-home": "Home",
        "nav-logout": "Logout"
    },
    "en": {
        "page-eyebrow": "Leaderboard",
        "page-title": "PLAYER LIST",
        "search-ph": "Search player...",
        "sort-completions": "Completions",
        "sort-difficulty": "Difficulty",
        "sort-name": "Name",
        "th-rank": "#",
        "th-player": "Player",
        "th-hardest": "Hardest Completion",
        "th-total": "Total Completions",
        "th-joined": "Joined",
        "nav-home": "Home",
        "nav-logout": "Logout"
    }
};
      window.setLang = function(l) {
        localStorage.setItem('eio-lang', l);
        applyLang(l);
      };
      function applyLang(l) {
        var t = T[l] || T['id'];
        document.querySelectorAll('[data-id]').forEach(function(el) {
          var key = el.getAttribute('data-id');
          if (!t[key]) return;
          if (el.tagName === 'INPUT') { el.placeholder = t[key]; }
          else if (el.tagName === 'A' || el.tagName === 'BUTTON') { el.textContent = t[key]; }
          else { el.innerHTML = t[key]; }
        });
        document.querySelectorAll('.lang-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
        });
      }
      var saved = localStorage.getItem('eio-lang') || 'id';
      applyLang(saved);
    })();
  </script>
</body>
</html>
