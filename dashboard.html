<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Elite Indonesian Obbyist</title>
  <link rel="icon" type="image/png" href="eio-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #CE1126; --red-dark: #8B0000;
      --white: #FFFFFF;
      --off-white: #F7F7F7;
      --border: #E2E2E2;
      --text: #1a1a1a;
      --text-muted: #777; 
        
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
      border-bottom: 3px solid var(--red);
    }

    .nav-logo { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 3px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--red); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-right { display: flex; gap: 1rem; align-items: center; }

    .lang-toggle { display: flex; border: 1.5px solid #E2E2E2; overflow: hidden; border-radius: 4px; }
    .lang-btn { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 0.4rem 0.7rem; background: transparent; border: none; cursor: pointer; color: #777; transition: all 0.2s; }
    .lang-btn.active { background: #CE1126; color: white; }

    .btn-sm { font-family: 'Inter', sans-serif; font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.5rem 1.1rem; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--text); cursor: pointer; transition: all 0.2s; }
    .btn-sm:hover { border-color: var(--red); color: var(--red); }

    .main { max-width: 1200px; margin: 0 auto; padding: 4rem 3rem; }

    .welcome-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem;
    }

    .welcome-eyebrow { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 0.5rem; }
    .welcome-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 3rem; letter-spacing: 2px; line-height: 1; }

    .sync-btn {
      font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 2px;
      text-transform: uppercase; padding: 0.9rem 1.8rem;
      border: 1px solid var(--red); background: transparent; color: var(--red);
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
    }
    .sync-btn:hover { background: var(--red); color: var(--text); }
    .sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(255,255,255,0.06); margin-bottom: 3rem; }
    .stat-card { background: var(--dark2); padding: 1.8rem; }
    .stat-label { font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
    .stat-val { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 2.5rem; color: var(--text); line-height: 1; }
    .stat-val.red { color: var(--red); }

    /* COMPLETIONS LIST */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .section-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; }

    .add-completion-btn {
      font-family: 'Inter', sans-serif; font-size: 0.68rem; letter-spacing: 2px;
      text-transform: uppercase; padding: 0.6rem 1.2rem;
      border: 1px solid var(--red); background: var(--red); color: var(--text);
      cursor: pointer; transition: all 0.2s;
    }
    .add-completion-btn:hover { background: transparent; color: var(--red); }

    .completions-table { width: 100%; border-collapse: collapse; }
    .completions-table thead tr { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .completions-table th { font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-align: left; padding: 0.8rem 1rem; font-weight: 400; }
    .completions-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
    .completions-table tbody tr:hover { background: var(--dark2); }
    .completions-table td { padding: 1rem; font-size: 0.9rem; }

    .diff-badge { font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 2px; }
    .diff-catastrophic { background: rgba(206,17,38,0.2); color: #ff4455; }
    .diff-extreme { background: rgba(255,100,0,0.2); color: #ff6400; }
    .diff-insane { background: rgba(180,0,200,0.2); color: #cc44ff; }
    .diff-remorseless { background: rgba(0,100,255,0.2); color: #4488ff; }
    .diff-intense { background: rgba(0,200,200,0.2); color: #44dddd; }
    .diff-challenging { background: rgba(200,200,0,0.2); color: #dddd44; }
    .diff-difficult { background: rgba(255,165,0,0.2); color: #ffaa00; }
    .diff-default { background: rgba(255,255,255,0.06); color: var(--text-muted); }

    .empty-completions { text-align: center; padding: 4rem 2rem; }
    .empty-completions h3 { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 2rem; color: rgba(255,255,255,0.1); margin-bottom: 0.5rem; }
    .empty-completions p { font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--text-muted); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); padding: 2.5rem; width: 90%; max-width: 480px; animation: fadeUp 0.3s ease; }
    .modal-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 0.4rem; }
    .modal-sub { font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-label { display: block; font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
    .form-input, .form-select { width: 100%; background: var(--white); border: 1px solid rgba(255,255,255,0.1); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 0.8rem 1rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus { border-color: var(--red); }
    .form-select option { background: var(--dark2); }
    .modal-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .btn-cancel { flex: 1; font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.9rem; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-muted); cursor: pointer; }
    .btn-save { flex: 2; font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.9rem; border: 1px solid var(--red); background: var(--red); color: var(--text); cursor: pointer; transition: all 0.2s; }
    .btn-save:hover { background: transparent; color: var(--red); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-msg { font-family: 'Inter', sans-serif; font-size: 0.7rem; padding: 0.7rem 1rem; margin-bottom: 1rem; display: none; }
    .modal-msg.error { background: rgba(206,17,38,0.1); border: 1px solid rgba(206,17,38,0.3); color: #ff6677; }
    .modal-msg.success { background: rgba(0,200,100,0.1); border: 1px solid rgba(0,200,100,0.3); color: #44ff88; }

    .sync-msg { font-family: 'Inter', sans-serif; font-size: 0.72rem; padding: 0.8rem 1rem; margin-bottom: 2rem; display: none; }
    .sync-msg.info { background: rgba(0,150,255,0.1); border: 1px solid rgba(0,150,255,0.3); color: #44aaff; }
    .sync-msg.success { background: rgba(0,200,100,0.1); border: 1px solid rgba(0,200,100,0.3); color: #44ff88; }
    .sync-msg.error { background: rgba(206,17,38,0.1); border: 1px solid rgba(206,17,38,0.3); color: #ff6677; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .main { padding: 2rem 1.5rem; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">EI<span>O</span></a>
    <ul class="nav-links">
      <li><a href="index.html" data-id="nav-home">Home</a></li>
      <li><a href="players.html" data-id="nav-players">Players</a></li>
      <li><a href="obbys.html" data-id="nav-obbys">Obby List</a></li>
    </ul>
    <div class="nav-right"><div class="lang-toggle" style="margin-right:0.5rem">
        <button class="lang-btn" data-lang="id" onclick="setLang('id')">IDN</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">ENG</button>
      </div>
      <button class="btn-sm" onclick="doLogout()" data-id="nav-logout">Logout</button>
    </div>
  </nav>

  <div class="main">
    <div class="welcome-bar">
      <div>
        <p class="welcome-eyebrow">Dashboard</p>
        <h1 class="welcome-title" id="welcome-title">SELAMAT DATANG</h1>
      </div>
      <button class="sync-btn" id="sync-btn" onclick="syncBadges()">
        <span>⟳</span> Sync dari Roblox
      </button>
    </div>

    <div class="sync-msg" id="sync-msg"></div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Username Roblox</div>
        <div class="stat-val" id="stat-roblox" style="font-size:1.5rem">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Completions</div>
        <div class="stat-val red" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Hardest Tower</div>
        <div class="stat-val" id="stat-hardest" style="font-size:1.2rem; line-height:1.2">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Bergabung Sejak</div>
        <div class="stat-val" id="stat-joined" style="font-size:1.4rem">—</div>
      </div>
    </div>

    <div class="section-header">
      <h2 class="section-title" data-id="section-title">COMPLETION LIST</h2>
      <button class="add-completion-btn" data-id="add-btn" onclick="openModal()">+ Tambah Manual</button>
    </div>

    <table class="completions-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nama Tower</th>
          <th>Difficulty</th>
          <th>Tanggal</th>
        </tr>
      </thead>
      <tbody id="completions-tbody">
        <tr><td colspan="4"><div class="empty-completions"><h3>MEMUAT...</h3></div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <h2 class="modal-title" data-id="modal-title">TAMBAH COMPLETION</h2>
      <p class="modal-sub" data-id="modal-sub">Catat tower yang berhasil kamu selesaikan</p>
      <div class="modal-msg" id="modal-msg"></div>
      <div class="form-group">
        <label class="form-label">Nama Tower</label>
        <input type="text" class="form-input" id="tower-name" placeholder="contoh: Tower of Pain">
      </div>
      <div class="form-group">
        <label class="form-label">Difficulty</label>
        <select class="form-select" id="tower-diff">
          <option value="">Pilih difficulty...</option>
          <option value="Catastrophic">Catastrophic</option>
          <option value="Extreme">Extreme</option>
          <option value="Insane">Insane</option>
          <option value="Remorseless">Remorseless</option>
          <option value="Intense">Intense</option>
          <option value="Challenging">Challenging</option>
          <option value="Difficult">Difficult</option>
          <option value="Hard">Hard</option>
          <option value="Medium">Medium</option>
          <option value="Easy">Easy</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()" data-id="btn-cancel">Batal</button>
        <button class="btn-save" id="save-btn" onclick="saveCompletion()" data-id="btn-save">Simpan →</button>
      </div>
    </div>
  </div>

  

  

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCL7iA256SiV7VFXUeQ20KAByToy9HQHGQ",
      authDomain: "eio-website.firebaseapp.com",
      projectId: "eio-website",
      storageBucket: "eio-website.firebasestorage.app",
      messagingSenderId: "1030038379623",
      appId: "1:1030038379623:web:54d24cb244d6dc9ade48c2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const TOWERSTATS_API_KEY = '12e8fc20-0162-4eec-af87-377d1f5286e0-5a60a5b8-da15-475b-a2ca-ee92c4ba1143';
    const UNIVERSE_ID = 8562822414;

    const diffOrder = {
      'Catastrophic': 10, 'Extreme': 9, 'Insane': 8, 'Remorseless': 7,
      'Intense': 6, 'Challenging': 5, 'Difficult': 4, 'Hard': 3, 'Medium': 2, 'Easy': 1
    };

    const diffClass = {
      'Catastrophic': 'diff-catastrophic', 'Extreme': 'diff-extreme',
      'Insane': 'diff-insane', 'Remorseless': 'diff-remorseless',
      'Intense': 'diff-intense', 'Challenging': 'diff-challenging',
      'Difficult': 'diff-difficult'
    };

    let currentUser = null;
    let userData = null;

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (!userDoc.exists() || !userDoc.data().robloxUsername) {
        window.location.href = 'login.html'; return;
      }
      userData = userDoc.data();
      renderDashboard();
    });

    function renderDashboard() {
      const completions = userData.completions || [];
      document.getElementById('welcome-title').textContent = `HEY, ${userData.robloxUsername?.toUpperCase()}!`;
      document.getElementById('stat-roblox').textContent = userData.robloxUsername;
      document.getElementById('stat-total').textContent = completions.length;

      // Hardest
      let hardest = null, hardestOrder = -1;
      completions.forEach(c => {
        const o = diffOrder[c.difficulty] || 0;
        if (o > hardestOrder) { hardestOrder = o; hardest = c; }
      });
      document.getElementById('stat-hardest').textContent = hardest ? `${hardest.towerName}` : '—';

      // Joined
      const joined = userData.joinedAt ? new Date(userData.joinedAt).toLocaleDateString('id-ID', { month: 'short', year: 'numeric' }) : '—';
      document.getElementById('stat-joined').textContent = joined;

      // Table
      const tbody = document.getElementById('completions-tbody');
      if (completions.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-completions"><h3>BELUM ADA COMPLETION</h3><p>Tambahkan completion pertamamu!</p></div></td></tr>`;
        return;
      }

      const sorted = [...completions].sort((a, b) => (diffOrder[b.difficulty] || 0) - (diffOrder[a.difficulty] || 0));
      tbody.innerHTML = sorted.map((c, i) => {
        const dClass = diffClass[c.difficulty] || 'diff-default';
        const date = c.completedAt ? new Date(c.completedAt).toLocaleDateString('id-ID') : '—';
        return `
          <tr>
            <td style="font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--muted)">${i+1}</td>
            <td style="font-weight:600">${c.towerName}</td>
            <td><span class="diff-badge ${dClass}">${c.difficulty}</span></td>
            <td style="font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted)">${date}</td>
          </tr>
        `;
      }).join('');
    }

    window.syncBadges = async () => {
      const btn = document.getElementById('sync-btn');
      const msg = document.getElementById('sync-msg');
      btn.disabled = true;
      btn.innerHTML = '<span>⟳</span> Syncing...';
      msg.textContent = 'Mengambil data badge dari TowerStats...';
      msg.className = 'sync-msg info';
      msg.style.display = 'block';

      try {
        // Get Roblox user ID first
        const userRes = await fetch(`https://users.roblox.com/v1/usernames/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usernames: [userData.robloxUsername], excludeBannedUsers: true })
        });
        const userJson = await userRes.json();
        const robloxId = userJson.data?.[0]?.id;

        if (!robloxId) {
          msg.textContent = 'Username Roblox tidak ditemukan. Cek kembali username kamu.';
          msg.className = 'sync-msg error';
          btn.disabled = false;
          btn.innerHTML = '<span>⟳</span> Sync dari Roblox';
          return;
        }

        // Get badges from TowerStats
        const badgeRes = await fetch('/api/towerstats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apiKey': TOWERSTATS_API_KEY },
          body: JSON.stringify({ id: robloxId, universe_id: UNIVERSE_ID })
        });

        const badgeData = await badgeRes.json();
        msg.textContent = `Sync selesai! Ditemukan ${badgeData.badges?.length || 0} badge. Data telah diperbarui.`;
        msg.className = 'sync-msg success';
      } catch(e) {
        msg.textContent = 'Gagal sync. Mungkin ada masalah CORS. Coba tambahkan manual.';
        msg.className = 'sync-msg error';
      }

      btn.disabled = false;
      btn.innerHTML = '<span>⟳</span> Sync dari Roblox';
    };

    window.doLogout = async () => { await signOut(auth); window.location.href = 'index.html'; };

    // Show admin link if admin
    if (userData.isAdmin) {
      const adminLink = document.createElement('a');
      adminLink.href = 'admin.html';
      adminLink.style = 'font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:0.5rem 1rem;background:#CE1126;color:white;border:1.5px solid #CE1126;text-decoration:none;';
      adminLink.textContent = '⚡ Admin Panel';
      document.querySelector('.nav-right').prepend(adminLink);
    }

    window.openModal = () => { document.getElementById('modal-overlay').classList.add('open'); };
    window.closeModal = () => {
      document.getElementById('modal-overlay').classList.remove('open');
      document.getElementById('tower-name').value = '';
      document.getElementById('tower-diff').value = '';
      document.getElementById('modal-msg').style.display = 'none';
    };
    window.closeModalOutside = (e) => { if (e.target === document.getElementById('modal-overlay')) closeModal(); };

    window.saveCompletion = async () => {
      const name = document.getElementById('tower-name').value.trim();
      const diff = document.getElementById('tower-diff').value;
      const btn = document.getElementById('save-btn');
      const msg = document.getElementById('modal-msg');
      msg.style.display = 'none';

      if (!name || !diff) {
        msg.textContent = 'Isi semua field dulu!';
        msg.className = 'modal-msg error';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      try {
        const newCompletion = { towerName: name, difficulty: diff, completedAt: new Date().toISOString() };
        await updateDoc(doc(db, 'users', currentUser.uid), { completions: arrayUnion(newCompletion) });
        userData.completions = [...(userData.completions || []), newCompletion];
        msg.textContent = 'Completion berhasil ditambahkan!';
        msg.className = 'modal-msg success';
        msg.style.display = 'block';
        renderDashboard();
        setTimeout(() => closeModal(), 1500);
      } catch(e) {
        msg.textContent = 'Gagal menyimpan. Coba lagi.';
        msg.className = 'modal-msg error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Simpan →';
      }
    };
  </script>

  

  
  <script>
    (function() {
      var T = {
    "id": {
        "nav-home": "Home",
        "nav-players": "Players",
        "nav-obbys": "Obby List",
        "nav-logout": "Logout",
        "section-title": "COMPLETION LIST",
        "add-btn": "+ Tambah Manual",
        "th-num": "#",
        "th-tower": "Nama Tower",
        "th-diff": "Difficulty",
        "th-date": "Tanggal",
        "modal-title": "TAMBAH COMPLETION",
        "modal-sub": "Catat tower yang berhasil kamu selesaikan",
        "btn-cancel": "Batal",
        "btn-save": "Simpan →",
        "sync-btn": "⟳ Sync dari Roblox"
    },
    "en": {
        "nav-home": "Home",
        "nav-players": "Players",
        "nav-obbys": "Obby List",
        "nav-logout": "Logout",
        "section-title": "COMPLETION LIST",
        "add-btn": "+ Add Manually",
        "th-num": "#",
        "th-tower": "Tower Name",
        "th-diff": "Difficulty",
        "th-date": "Date",
        "modal-title": "ADD COMPLETION",
        "modal-sub": "Record the tower you completed",
        "btn-cancel": "Cancel",
        "btn-save": "Save →",
        "sync-btn": "⟳ Sync from Roblox"
    }
};
      window.setLang = function(l) {
        localStorage.setItem('eio-lang', l);
        applyLang(l);
      };
      function applyLang(l) {
        var t = T[l] || T['id'];
        document.querySelectorAll('[data-id]').forEach(function(el) {
          var key = el.getAttribute('data-id');
          if (!t[key]) return;
          if (el.tagName === 'INPUT') { el.placeholder = t[key]; }
          else if (el.tagName === 'A' || el.tagName === 'BUTTON') { el.textContent = t[key]; }
          else { el.innerHTML = t[key]; }
        });
        document.querySelectorAll('.lang-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
        });
      }
      var saved = localStorage.getItem('eio-lang') || 'id';
      applyLang(saved);
    })();
  </script>
</body>
