<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Obby List — Elite Indonesian Obbyist</title>
  <link rel="icon" type="image/png" href="eio-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #CE1126;
      --red-dark: #8B0000;
      --white: #FFFFFF;
      --off-white: #F7F7F7;
      --border: #E2E2E2;
      --text: #1a1a1a;
      --text-muted: #777;
      
      
      
      
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 3px solid var(--red);
    }

    .nav-logo { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 3px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--red); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-links a.active { color: var(--red); }


    .lang-toggle { display: flex; border: 1.5px solid #E2E2E2; overflow: hidden; border-radius: 4px; }
    .lang-btn { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 0.4rem 0.7rem; background: transparent; border: none; cursor: pointer; color: #777; transition: all 0.2s; }
    .lang-btn.active { background: #CE1126; color: white; }

    .nav-right { display: flex; gap: 1rem; align-items: center; }
    .nav-user { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); }
    .btn-sm { font-family: 'Inter', sans-serif; font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.5rem 1.1rem; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--text); cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .btn-sm:hover { border-color: var(--red); color: var(--red); }
    .btn-sm-red { border-color: var(--red) !important; background: var(--red) !important; }
    .btn-sm-red:hover { background: transparent !important; color: var(--red) !important; }

    /* PAGE HEADER */
    .page-header {
      padding: 4rem 3rem 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 100% at 0% 50%, rgba(206,17,38,0.08) 0%, transparent 60%);
    }

    .page-header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 2rem; }

    .eyebrow { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--red); margin-bottom: 0.8rem; }
    .page-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: clamp(3rem, 6vw, 5rem); letter-spacing: 2px; line-height: 1; }

    .search-wrap { position: relative; }
    .search-input {
      background: var(--dark2); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.8rem;
      padding: 0.8rem 1rem 0.8rem 2.5rem; outline: none; width: 240px;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--red); }
    .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.8rem; }

    /* TABLE */
    .table-wrap { max-width: 1200px; margin: 0 auto; padding: 3rem; }

    .table-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem;
    }

    .table-count { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); }

    .sort-btns { display: flex; gap: 0.5rem; }
    .sort-btn {
      font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 1px;
      text-transform: uppercase; padding: 0.4rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.1); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    }
    .sort-btn.active { border-color: var(--red); color: var(--red); }

    .player-table { width: 100%; border-collapse: collapse; }

    .player-table thead tr {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .player-table th {
      font-family: 'Inter', sans-serif; font-size: 0.65rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
      text-align: left; padding: 0.8rem 1rem; font-weight: 400;
    }

    .player-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
      cursor: pointer;
    }

    .player-table tbody tr:hover { background: var(--dark2); }

    .player-table td { padding: 1rem; }

    .rank-cell {
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.5rem;
      color: rgba(255,255,255,0.15); width: 60px;
    }

    .rank-1 { color: #FFD700; }
    .rank-2 { color: #C0C0C0; }
    .rank-3 { color: #CD7F32; }

    .player-info { display: flex; align-items: center; gap: 1rem; }

    .player-avatar {
      width: 40px; height: 40px;
      background: var(--dark3);
      border: 1px solid rgba(206,17,38,0.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.1rem; color: var(--red);
      flex-shrink: 0; overflow: hidden;
    }

    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .tower-icon { width: 40px; height: 40px; background: var(--off-white); border: 1px solid rgba(206,17,38,0.2); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: var(--red); flex-shrink: 0; border-radius: 4px; }
    .player-tag { font-size: 0.68rem; font-weight: 600; padding: 0.2rem 0.55rem; background: var(--off-white, #f7f7f7); border: 1px solid var(--border, #E2E2E2); color: var(--text); border-radius: 2px; }
    .player-tag-more { background: rgba(206,17,38,0.08); border-color: rgba(206,17,38,0.2); color: var(--red); }

    .player-name { font-weight: 700; font-size: 0.95rem; }
    .player-email { font-family: 'Inter', sans-serif; font-size: 0.65rem; color: var(--text-muted); margin-top: 0.2rem; }

    .diff-badge {
      font-family: 'Inter', sans-serif; font-size: 0.65rem;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 0.25rem 0.6rem; border-radius: 2px; display: inline-block;
    }
    .diff-horrific { background: rgba(170,0,255,0.15); color: #aa00ff; border: 1px solid rgba(170,0,255,0.3); }
    .diff-unreal { background: rgba(60,0,120,0.2); color: #3c0080; border: 1px solid rgba(60,0,120,0.4); }
    .diff-catastrophic { background: rgba(240,240,240,0.9); color: #1a1a1a; border: 1px solid #ccc; }
    .diff-extreme { background: rgba(30,144,255,0.15); color: #1e90ff; border: 1px solid rgba(30,144,255,0.3); }
    .diff-insane { background: rgba(0,80,220,0.15); color: #0050dc; border: 1px solid rgba(0,80,220,0.3); }
    .diff-remorseless { background: rgba(255,20,147,0.15); color: #ff1493; border: 1px solid rgba(255,20,147,0.3); }
    .diff-intense { background: rgba(30,30,30,0.85); color: #f0f0f0; border: 1px solid #444; }
    .diff-challenging { background: rgba(160,20,20,0.15); color: #a01414; border: 1px solid rgba(160,20,20,0.3); }
    .diff-difficult { background: rgba(255,120,0,0.15); color: #e06000; border: 1px solid rgba(255,120,0,0.3); }
    .diff-hard { background: rgba(255,120,0,0.15); color: #e06000; border: 1px solid rgba(255,120,0,0.3); }
    .diff-medium { background: rgba(220,180,0,0.15); color: #a07800; border: 1px solid rgba(220,180,0,0.3); }
    .diff-easy { background: rgba(30,160,60,0.15); color: #1a9030; border: 1px solid rgba(30,160,60,0.3); }
    .diff-default { background: var(--off-white, #f7f7f7); color: #777; border: 1px solid #ddd; }


    .completion-count {
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.8rem; color: var(--text);
    }

    .loading-row td {
      text-align: center; padding: 4rem;
      font-family: 'Inter', sans-serif; font-size: 0.75rem;
      letter-spacing: 2px; color: var(--text-muted);
    }

    .empty-state {
      text-align: center; padding: 5rem 2rem;
    }

    .empty-state h3 {
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 2rem;
      color: rgba(255,255,255,0.2); margin-bottom: 0.5rem;
    }

    .empty-state p { font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--text-muted); }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .page-header { padding: 3rem 1.5rem 2rem; }
      .table-wrap { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">EI<span>O</span></a>
    <ul class="nav-links">
      <li><a href="index.html" data-id="nav-home">Home</a></li>
      <li><a href="players.html">Players</a></li>
      <li><a href="obbys.html" class="active">Obby List</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
    <div class="nav-right"><div class="lang-toggle" style="margin-right:0.5rem">
        <button class="lang-btn" data-lang="id" onclick="setLang('id')">IDN</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">ENG</button>
      </div>
      <span class="nav-user" id="nav-user">—</span>
      <a href="login.html" class="btn-sm" id="nav-login">Login</a>
      <button class="btn-sm" id="nav-logout" style="display:none" onclick="doLogout()" data-id="nav-logout">Logout</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <p class="eyebrow" data-id="page-eyebrow">Tower Database</p>
        <h1 class="page-title" data-id="page-title">OBBY LIST</h1>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Cari tower..." data-id="search-ph" oninput="renderObbys()">
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-meta">
      <span class="table-count" id="table-count">Memuat...</span>
      <div class="sort-btns">
        <button class="sort-btn active" id="sort-difficulty-btn" onclick="sortBy('difficulty')">Difficulty</button>
        <button class="sort-btn" id="sort-beat-btn" onclick="sortBy('beat')">Most Beaten</button>
        <button class="sort-btn" id="sort-name-btn" onclick="sortBy('name')">Nama</button>
      </div>
    </div>

    <table class="player-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Tower</th>
          <th>Difficulty</th>
          <th>Beaten By</th>
          <th>Total Beats</th>
        </tr>
      </thead>
      <tbody id="obby-tbody">
        <tr class="loading-row"><td colspan="5">MEMUAT DATA PLAYER...</td></tr>
      </tbody>
    </table>
  </div>

  

  

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCL7iA256SiV7VFXUeQ20KAByToy9HQHGQ",
      authDomain: "eio-website.firebaseapp.com",
      projectId: "eio-website",
      storageBucket: "eio-website.firebasestorage.app",
      messagingSenderId: "1030038379623",
      appId: "1:1030038379623:web:54d24cb244d6dc9ade48c2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const diffOrder = {
      'Easy':1,'Medium':2,'Hard':3,'Challenging':4,'Intense':5,
      'Remorseless':6,'Insane':7,'Extreme':8,'Catastrophic':9,'Horrific':10,'Unreal':11
    };
    const diffClass = {
      'Unreal':'diff-unreal','Horrific':'diff-horrific','Catastrophic':'diff-catastrophic',
      'Extreme':'diff-extreme','Insane':'diff-insane','Remorseless':'diff-remorseless',
      'Intense':'diff-intense','Challenging':'diff-challenging','Difficult':'diff-difficult',
      'Hard':'diff-hard','Medium':'diff-medium','Easy':'diff-easy'
    };

    let allObbys = [];
    let currentSort = 'difficulty';

    onAuthStateChanged(auth, async user => {
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        const uname = userDoc.exists() ? (userDoc.data().displayName || userDoc.data().robloxUsername || user.email?.split('@')[0]) : user.email?.split('@')[0];
        document.getElementById('nav-user').textContent = uname;
        document.getElementById('nav-login').style.display = 'none';
        document.getElementById('nav-logout').style.display = 'block';
      }
    });

    window.doLogout = async () => { await signOut(auth); window.location.href = 'index.html'; };

    async function loadObbys() {
      const snap = await getDocs(collection(db, 'users'));
      const towerMap = {};
      snap.forEach(docSnap => {
        const data = docSnap.data();
        (data.completions || []).forEach(c => {
          const key = c.towerName?.toLowerCase().trim();
          if (!key) return;
          if (!towerMap[key]) towerMap[key] = { towerName: c.towerName, difficulty: c.difficulty, players: [] };
          towerMap[key].players.push(data.robloxUsername || '?');
        });
      });
      allObbys = Object.values(towerMap);
      renderObbys();
    }

    window.sortBy = (key) => {
      currentSort = key;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`sort-${key}-btn`).classList.add('active');
      renderObbys();
    };

    window.renderObbys = () => {
      const query = document.getElementById('search-input').value.toLowerCase();
      let filtered = allObbys.filter(o => o.towerName.toLowerCase().includes(query));

      if (currentSort === 'difficulty') filtered.sort((a, b) => (diffOrder[b.difficulty]||0) - (diffOrder[a.difficulty]||0));
      else if (currentSort === 'beat') filtered.sort((a, b) => b.players.length - a.players.length);
      else filtered.sort((a, b) => a.towerName.localeCompare(b.towerName));

      const tbody = document.getElementById('obby-tbody');
      document.getElementById('table-count').textContent = `${filtered.length} tower`;

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><h3>TIDAK ADA TOWER</h3><p>Belum ada completion yang cocok.</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map((o, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        const dClass = diffClass[o.difficulty] || 'diff-default';
        const shownPlayers = o.players.slice(0, 5);
        const extra = o.players.length - 5;
        return `
          <tr>
            <td class="rank-cell ${rankClass}">${i + 1}</td>
            <td>
              <div class="player-info">
                <div class="tower-icon">${o.towerName.charAt(0).toUpperCase()}</div>
                <div class="player-name">${o.towerName}</div>
              </div>
            </td>
            <td><span class="diff-badge ${dClass}">${o.difficulty || '—'}</span></td>
            <td>
              <div style="display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;">
                ${shownPlayers.map(p => `<span class="player-tag">${p}</span>`).join('')}
                ${extra > 0 ? `<span class="player-tag player-tag-more">+${extra} lagi</span>` : ''}
              </div>
            </td>
            <td><span class="completion-count">${o.players.length}</span></td>
          </tr>`;
      }).join('');
    };

    loadObbys();
  </script>

  

  
  <script>
    (function() {
      var T = {
        "id": { "page-eyebrow": "Tower Database", "page-title": "OBBY LIST", "search-ph": "Cari tower..." },
        "en": { "page-eyebrow": "Tower Database", "page-title": "OBBY LIST", "search-ph": "Search tower..." }
      };
      window.setLang = function(l) { localStorage.setItem('eio-lang', l); applyLang(l); };
      function applyLang(l) {
        var t = T[l] || T['id'];
        document.querySelectorAll('[data-id]').forEach(function(el) {
          var key = el.getAttribute('data-id');
          if (!t[key]) return;
          if (el.tagName === 'INPUT') { el.placeholder = t[key]; }
          else { el.innerHTML = t[key]; }
        });
        document.querySelectorAll('.lang-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
        });
      }
      applyLang(localStorage.getItem('eio-lang') || 'id');
    })();
  </script>
</body>
</html>
